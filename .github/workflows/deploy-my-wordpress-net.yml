name: Deploy my.wordpress.net

on:
    workflow_dispatch:
    # Deploy every Wednesday at 11am UTC (same as main website)
    schedule:
        - cron: '0 11 * * 3'

concurrency:
    group: my-wordpress-net-deployment

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
    # Check preconditions in a separate job because secrets aren't
    # available in job-level `if` conditions.
    check_preconditions:
        # Only run from the trunk branch when triggered by a Playground maintainer
        if: >
            github.ref == 'refs/heads/trunk' && (
                github.event_name == 'workflow_run' ||
                (github.event_name == 'workflow_dispatch' && github.actor == 'github-actions[bot]') ||
                github.actor == 'adamziel' ||
                github.actor == 'akirk' ||
                github.actor == 'dmsnell' ||
                github.actor == 'bgrgicak' ||
                github.actor == 'brandonpayton' ||
                github.actor == 'zaerl' ||
                github.actor == 'janjakes' ||
                github.actor == 'mho22' ||
                github.actor == 'ashfame'
            )
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions: {}
        environment:
            name: my-wordpress-net-wp-cloud
        outputs:
            meets_deploy_preconditions: ${{ steps.check.outputs.meets_deploy_preconditions }}
        steps:
            # Confirm deploy secrets are configured. This way, this workflow won't
            # run on a repo fork by default. It will only run when the fork admin opts
            # in by configuring the workflow's required secrets.
            #
            # Secrets aren't available in job-level `if` conditions,
            # so we check for them here.
            - name: Check deploy secrets are configured
              id: check
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_MY_WORDPRESS_NET_HOST }}
              run: |
                  if [ -z "$DEPLOY_HOST" ]; then
                    echo "Deploy secrets are not configured. Skipping deployment."
                    echo "meets_deploy_preconditions=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "meets_deploy_preconditions=true" >> "$GITHUB_OUTPUT"
                  fi

    build_and_deploy:
        needs: check_preconditions
        if: needs.check_preconditions.outputs.meets_deploy_preconditions == 'true'

        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read # Required to clone the repo.
        environment:
            name: my-wordpress-net-wp-cloud
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: true
                  ref: ${{ vars.GIT_REF_TO_DEPLOY }}
            - uses: ./.github/actions/prepare-playground
            - name: Build my-wordpress-net
              run: npx nx build playground-personal-wp
              env:
                  CORS_PROXY_URL: ${{ vars.CORS_PROXY_URL }}
            - run: tar -czf my-wordpress-net.tar.gz dist/packages/playground/my-wordpress-net
            - uses: actions/upload-artifact@v4
              with:
                  name: my-wordpress-net
                  path: my-wordpress-net.tar.gz

            - name: Deploy my.wordpress.net build
              shell: bash
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.DEPLOY_MY_WORDPRESS_NET_HOST_KEY }}" >> ~/.ssh/known_hosts
                  echo "${{ secrets.DEPLOY_MY_WORDPRESS_NET_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 0600 ~/.ssh/*

                  # Website files (combined remote + personal-wp)
                  rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --delete \
                    dist/packages/playground/my-wordpress-net/ \
                    ${{ secrets.DEPLOY_MY_WORDPRESS_NET_USER }}@${{ secrets.DEPLOY_MY_WORDPRESS_NET_HOST }}:'~/updated-playground-files'

                  # Include MIME types for use with PHP-served files
                  cp packages/php-wasm/universal/src/lib/mime-types.json \
                    packages/playground/website-deployment/

                  # Host-specific deployment scripts and server config (reuse website-deployment)
                  rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --delete \
                    packages/playground/website-deployment/ \
                    ${{ secrets.DEPLOY_MY_WORDPRESS_NET_USER }}@${{ secrets.DEPLOY_MY_WORDPRESS_NET_HOST }}:'~/website-deployment'

                  # Apply update
                  ssh -i ~/.ssh/id_ed25519 \
                    ${{ secrets.DEPLOY_MY_WORDPRESS_NET_USER }}@${{ secrets.DEPLOY_MY_WORDPRESS_NET_HOST }} \
                    -tt -C '~/website-deployment/apply-update.sh'

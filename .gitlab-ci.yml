# .gitlab-ci.yml  —  parity with .github/workflows/ci.yml
# Runner: docker+machine or shell; jobs run as root by default, so no “sudo”
image: node:20

variables:
  # MySQL service env for test‑unit‑asyncify matrix
  MYSQL_DATABASE: "test_db"
  MYSQL_USER: "user"
  MYSQL_PASSWORD: "password"
  MYSQL_ROOT_PASSWORD: "rootpassword"
  # Re‑use in Playwright + Cypress
  CYPRESS_CI: "1"
  CI: "true"

# A re‑usable “prepare‑playground” block (one‑to‑one with the composite action)
.prepare_playground: &prepare_playground |
  git fetch origin trunk --depth 1 --recurse-submodules
  mkdir -p ~/.cache
  if [ ! -d node_modules ]; then npm ci ; fi
  echo "NX_BASE=$(git rev-parse origin/trunk)" >> $CI_PROJECT_DIR/.gitlab_env
  echo "NX_HEAD=$(git rev-parse HEAD)"         >> $CI_PROJECT_DIR/.gitlab_env
  npx nx reset

stages:
  - lint
  - test
  - e2e
  - build
  - deploy

cache:
  key: "$CI_JOB_NAME-$CI_JOB_STAGE-$CI_RUNNER_ARCH"
  paths:
    - node_modules/

#############################
## Lint + type‑check stage ##
#############################
lint_and_typecheck:
  stage: lint
  script:
    - *prepare_playground
    - npx nx affected --target=lint
    - npx nx affected --target=typecheck
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

##########################################
## Unit tests: “asyncify” 14‑way matrix ##
##########################################
test_unit_asyncify:
  stage: test
  parallel:
    matrix:
      - TARGET: test                  NAME: "1/14"
      - TARGET: test-php              NAME: "2/14"
      - TARGET: test-php-request-handler-files          NAME: "3/14"
      - TARGET: test-php-request-handler-requests       NAME: "4/14"
      - TARGET: test-php-asyncify-file-get-contents-http   NAME: "5/14"
      - TARGET: test-php-asyncify-file-get-contents-https  NAME: "6/14"
      - TARGET: test-php-asyncify-fopen-http            NAME: "7/14"
      - TARGET: test-php-asyncify-fopen-https           NAME: "8/14"
      - TARGET: test-php-asyncify-fsockopen-http        NAME: "9/14"
      - TARGET: test-php-asyncify-fsockopen-https       NAME: "10/14"
      - TARGET: test-php-asyncify-gethostbyname-http    NAME: "11/14"
      - TARGET: test-php-asyncify-gethostbyname-https   NAME: "12/14"
      - TARGET: test-php-asyncify-mysqli-http           NAME: "13/14"
      - TARGET: test-php-asyncify-mysqli-https          NAME: "14/14"
  services:
    - name: mysql:5.7
      alias: mysql
  script:
    - *prepare_playground
    - node --expose-gc node_modules/nx/bin/nx affected --target=$TARGET
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'
  artifacts:
    when: on_failure
    expire_in: 3 days
    paths:
      - ./**/junit*.xml
      - ./**/coverage/

########################
## E2E – Cypress run  ##
########################
test_e2e_cypress:
  stage: e2e
  needs: [lint_and_typecheck]
  script:
    - *prepare_playground
    - ./node_modules/.bin/cypress install --force
    - npx nx e2e playground-website --configuration=ci --verbose
  artifacts:
    when: on_failure
    expire_in: 3 days
    paths:
      - dist/cypress/packages/playground/website/screenshots/
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

#####################################################
## Prepare static dist once for Playwright browsers ##
#####################################################
test_e2e_playwright_prepare:
  stage: e2e
  needs: [lint_and_typecheck]
  script:
    - *prepare_playground
    - npx playwright install --with-deps
    - CORS_PROXY_URL=http://127.0.0.1:5263/cors-proxy.php? \
        npx nx e2e:playwright:prepare-app-deploy-and-offline-mode playground-website
    - zip -rq dist.zip dist
  artifacts:
    paths: [dist.zip]
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

#############################################
## Three‑way Playwright matrix (browsers)  ##
#############################################
test_e2e_playwright:
  stage: e2e
  needs:
    - job: test_e2e_playwright_prepare
      artifacts: true
  parallel:
    matrix:
      - PART: chromium
      - PART: firefox
      - PART: webkit
  script:
    - *prepare_playground
    - unzip -q dist.zip
    - npx playwright install $PART --with-deps
    - >
      if [ "$PART" = "firefox" ];
      then HOME=/root XDG_RUNTIME_DIR=/root npx playwright test \
        --config=packages/playground/website/playwright/playwright.ci.config.ts --project=$PART ;
      else npx playwright test \
        --config=packages/playground/website/playwright/playwright.ci.config.ts --project=$PART ; fi
  artifacts:
    expire_in: 3 days
    paths:
      - packages/playground/website/playwright-report/
      - packages/playground/website/playwright/e2e/deployment.spec.ts-snapshots/
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

#####################################################
## Build + publish+consume un‑built NPM packages   ##
#####################################################
test_built_npm_packages:
  stage: test
  needs: [lint_and_typecheck]
  script:
    - *prepare_playground
    - |
      VERSION=$(date +%s)
      PORT=9934
      PACKAGE_BASE_URL=http://127.0.0.1:$PORT/$VERSION
      echo "VERSION=$VERSION" >> .gitlab_env
      echo "PORT=$PORT" >> .gitlab_env
      echo "PACKAGE_BASE_URL=$PACKAGE_BASE_URL" >> .gitlab_env
      HOST_PATH="./dist/packages-for-self-hosting/http%3A%2F%2F127.0.0.1%3A$PORT%2F$VERSION"
    - npx nx run-many --all --target=package-for-self-hosting -- --hostingBaseUrl="$PACKAGE_BASE_URL"
    - npx --yes bun@latest install   
    - >
      RUNNER_TRACKING_ID="" bun ./packages/playground/cli/src/cli.ts server
      --port=$PORT --mount="$HOST_PATH:/wordpress/$VERSION" --quiet &
    - |
      for i in {1..60}; do
        curl -f "$PACKAGE_BASE_URL/v$VERSION/@wp-playground-cli-$VERSION.tar.gz" && break || sleep 1
      done
    - |
      cd packages/playground/test-built-npm-packages/es-modules-and-vitest &&
      jq --arg pkg "$PACKAGE_BASE_URL/v$VERSION/@wp-playground-cli-$VERSION.tar.gz" \
         '.devDependencies["@wp-playground/cli"]=$pkg' package.json > p.tmp && mv p.tmp package.json &&
      npm install && npm run test
    - |
      cd ../../commonjs-and-jest &&
      jq --arg pkg "$PACKAGE_BASE_URL/v$VERSION/@wp-playground-cli-$VERSION.tar.gz" \
         '.devDependencies["@wp-playground/cli"]=$pkg' package.json > p.tmp && mv p.tmp package.json &&
      npm install && npm run test
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

##################################
## “Un‑built” CLI smoke test   ##
##################################
test_running_unbuilt_playground_cli:
  stage: test
  needs: [lint_and_typecheck]
  script:
    - *prepare_playground
    - packages/playground/cli/src/test/test-running-unbuilt-cli.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

#################
## Build stage ##
#################
build:
  stage: build
  needs: [lint_and_typecheck]
  script:
    - *prepare_playground
    - |
      if ADDITIONAL_REMOTE_ORIGINS=invalid-origin npx nx build playground-client ; then
        echo "Build was expected to fail with invalid origin" && exit 1
      fi
    - npx nx affected --target=build --parallel=3 --verbose
  rules:
    - if: '$CI_PIPELINE_SOURCE =~ /(push|merge_request_event)/'

########################################
## GitLab Pages – docs site deployment ##
########################################
pages:
  stage: deploy
  needs:
    - job: build
    - job: test_unit_asyncify
    - job: test_e2e_cypress
  rules:
    - if: '$CI_COMMIT_BRANCH == "trunk"'
      when: on_success
    - when: never
  script:
    - *prepare_playground
    - npm run build:docs
    - mv dist/docs/build public
  artifacts:
    paths: [public]
    expire_in: 1 week